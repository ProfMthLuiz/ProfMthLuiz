name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ProfMthLuiz
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=EC4899
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=EC4899

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
